apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: precis-api-limits
  namespace: precis
spec:
  buffering:
    maxRequestBodyBytes: 57671680  # 55MB — matches MAX_UPLOAD_SIZE_MB + overhead
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: precis-api
  namespace: precis
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: precis-precis-api-limits@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: precis-api
                port:
                  number: 8000
