apiVersion: apps/v1
kind: Deployment
metadata:
  name: precis-api
  namespace: precis
  labels:
    app: precis-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: precis-api
  template:
    metadata:
      labels:
        app: precis-api
    spec:
      containers:
        - name: api
          image: precis-api:latest
          ports:
            - containerPort: 8000
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: precis-api-secrets
            - configMapRef:
                name: precis-api-config
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
